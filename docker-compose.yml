version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fastshow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fastshow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["sh", "-c", "echo 'Postgres user=$POSTGRES_USER, password=$POSTGRES_PASSWORD'; docker-entrypoint.sh postgres"]

  redis:
    image: redis:7-alpine
    container_name: fastshow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - fastshow-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fastshow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - fastshow-net
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - fastshow-net
    entrypoint: >
      /bin/sh -c "
      echo 'waiting minio...' &&

      until mc alias set fastshow http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD}; do
        sleep 2;
      done &&

      echo 'config webhook...' &&
      mc admin config set fastshow notify_webhook:1 endpoint=http://node-app:3001/minio/event &&

      mc admin service restart fastshow &&

      echo 'create bucket...' &&
      mc mb -p fastshow/files || true &&

      echo 'add event...' &&
      mc event add fastshow/files arn:minio:sqs::1:webhook --event put &&

      echo 'set lifecycle...' &&
      cat > /tmp/lifecycle.json <<EOF
      {
        \"Rules\": [
          {
            \"ID\": \"expire-7-days\",
            \"Status\": \"Enabled\",
            \"Expiration\": { \"Days\": 7 },
            \"Filter\": { \"Prefix\": \"\" }
          }
        ]
      }
      EOF

      mc ilm import fastshow/files /tmp/lifecycle.json &&

      echo 'minio init done'
      "
      
  node-app:
    build: .
    container_name: fastshow-node
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - server/config.env
    networks:
      - fastshow-net
    ports:
    - "3001:3001"   # 这里添加端口映射

  nginx:
    image: nginx:alpine
    container_name: fastshow-nginx
    restart: unless-stopped
    depends_on:
      - node-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./dist:/usr/share/nginx/html
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - fastshow-net

  # 自动申请 HTTPS 证书（可选）
  certbot:
    image: certbot/certbot
    container_name: fastshow-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c"
    command: >
      "trap exit TERM;
       while :; do
         certbot renew;
         sleep 12h & wait $${!};
       done"
    networks:
      - fastshow-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  fastshow-net:
    driver: bridge