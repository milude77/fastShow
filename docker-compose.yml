version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fastshow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fastshow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["sh", "-c", "echo 'Postgres user=$POSTGRES_USER, password=$POSTGRES_PASSWORD'; docker-entrypoint.sh postgres"]

  redis:
    image: redis:7-alpine
    container_name: fastshow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - fastshow-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fastshow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - fastshow-net
    ports:
      - "9001:9001"   
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-app:
    build: .
    container_name: fastshow-node
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - server/config.env
    networks:
      - fastshow-net
    ports:
    - "3001:3001"   # 这里添加端口映射

  nginx:
    image: nginx:alpine
    container_name: fastshow-nginx
    restart: unless-stopped
    depends_on:
      - node-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./dist:/usr/share/nginx/html
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - fastshow-net

  # 自动申请 HTTPS 证书（可选）
  certbot:
    image: certbot/certbot
    container_name: fastshow-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c"
    command: >
      "trap exit TERM;
       while :; do
         certbot renew;
         sleep 12h & wait $${!};
       done"
    networks:
      - fastshow-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  fastshow-net:
    driver: bridge